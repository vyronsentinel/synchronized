<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNCHRONIZED | Admin</title>
  <meta name="theme-color" content="#ff2d78">
  <meta name="robots" content="noindex, nofollow">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink: #ff2d78; --cyan: #00f0ff; --gold: #ffd700;
      --dark: #050510; --dark2: #0a0a1e; --dark3: #0f0f2a;
      --text: #e8e8f8; --muted: #dae7e6;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--dark); color: var(--text);
      font-family: 'Exo 2', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 2rem 1rem 4rem; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
      pointer-events: none; z-index: 9999;
    }
    .grid-bg {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,240,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none; z-index: 0;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; }
    .orb-pink { width: 420px; height: 420px; background: var(--pink); top: -120px; right: -120px; }
    .orb-cyan  { width: 320px; height: 320px; background: var(--cyan); bottom: -80px; left: -80px; }
    .box {
      position: relative; z-index: 1; width: 100%; max-width: 560px;
      background: var(--dark2); border: 1px solid rgba(0,240,255,0.15);
      padding: 2.5rem 2rem; margin-top: 1.5rem;
      clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 22px 100%, 0 calc(100% - 22px));
    }
    .box-logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .box-logo img { height: 34px; width: auto; }
    .box-logo-text { font-family: 'Orbitron', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.2em; color: var(--cyan); text-transform: uppercase; }
    .box-logo-text span { color: var(--pink); }
    .box-label { font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; letter-spacing: 0.4em; color: var(--pink); text-transform: uppercase; margin-bottom: 0.4rem; }
    .box-title { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.5rem; letter-spacing: 0.08em; color: #fff; margin-bottom: 0.2rem; }
    .box-title span { color: var(--cyan); }
    .box-divider { width: 55px; height: 2px; background: linear-gradient(90deg, var(--pink), transparent); margin: 0.65rem 0 1.75rem; }
    .field { margin-bottom: 1.2rem; }
    .field label { display: block; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.76rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.45rem; }
    .field input, .field textarea { width: 100%; background: var(--dark3); border: 1px solid rgba(0,240,255,0.15); color: var(--text); font-family: 'Exo 2', sans-serif; font-size: 0.93rem; padding: 0.72rem 0.95rem; border-radius: 2px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; resize: none; }
    .field input:focus, .field textarea:focus { border-color: rgba(0,240,255,0.45); box-shadow: 0 0 0 3px rgba(0,240,255,0.08); }
    .field input[type="password"] { letter-spacing: 0.2em; }
    .field textarea { min-height: 145px; line-height: 1.65; }
    .toolbar { display: flex; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; }
    .tool-btn { background: rgba(0,240,255,0.05); border: 1px solid rgba(0,240,255,0.2); color: var(--muted); font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 13px; border-radius: 2px; cursor: pointer; transition: all 0.18s; }
    .tool-btn:hover, .tool-btn.active { background: rgba(0,240,255,0.12); border-color: rgba(0,240,255,0.5); color: var(--cyan); }
    #emojiGrid { display: none; background: #0b0b22; border: 1px solid rgba(0,240,255,0.14); border-radius: 4px; padding: 8px; margin-bottom: 8px; max-height: 160px; overflow-y: auto; }
    #emojiGrid::-webkit-scrollbar { width: 3px; }
    #emojiGrid::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.2); border-radius: 2px; }
    .eg-inner { display: flex; flex-wrap: wrap; gap: 2px; }
    .emoji-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 4px 6px; border-radius: 3px; transition: background 0.15s; line-height: 1; }
    .emoji-btn:hover { background: rgba(0,240,255,0.12); }
    #imgPreviews { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 8px; }
    .img-thumb { position: relative; width: 76px; height: 76px; }
    .img-thumb img { width: 76px; height: 76px; object-fit: cover; border-radius: 3px; border: 1px solid rgba(0,240,255,0.2); }
    .img-thumb-del { position: absolute; top: -6px; right: -6px; background: var(--pink); border: none; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 0.6rem; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
    .img-thumb-del:hover { background: #ff5599; }
    .char-count { font-family: 'Share Tech Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; color: rgba(136,136,170,0.5); text-align: right; margin-top: 3px; }
    .btn-primary { width: 100%; background: var(--pink); color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 28px; border: none; border-radius: 2px; cursor: pointer; transition: all 0.2s; clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px)); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover { background: #ff5599; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,45,120,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { width: 100%; background: transparent; color: var(--cyan); font-family: 'Orbitron', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 28px; border: 1px solid rgba(0,240,255,0.3); border-radius: 2px; cursor: pointer; transition: all 0.2s; margin-top: 0.75rem; }
    .btn-secondary:hover { background: rgba(0,240,255,0.06); }
    .msg { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; padding: 10px 13px; border-radius: 2px; margin-bottom: 1.2rem; display: none; text-transform: uppercase; }
    .msg.error   { color: var(--pink); background: rgba(255,45,120,0.08); border: 1px solid rgba(255,45,120,0.25); display: block; }
    .msg.success { color: var(--cyan); background: rgba(0,240,255,0.08); border: 1px solid rgba(0,240,255,0.25); display: block; }
    .posts-section { margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1.5rem; }
    .posts-label { font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; letter-spacing: 0.28em; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; }
    .post-item { background: var(--dark3); border: 1px solid rgba(0,240,255,0.09); border-radius: 2px; padding: 0.8rem 1rem; margin-bottom: 0.75rem; position: relative; clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); transition: border-color 0.2s, opacity 0.3s, transform 0.3s; }
    .post-item:hover { border-color: rgba(0,240,255,0.2); }
    .post-item.deleting { opacity: 0; transform: translateX(20px); }
    .post-item.editing { border-color: rgba(0,240,255,0.4); background: #0b0b20; }
    .post-item-body { padding-right: 6rem; }
    .post-item-content { font-size: 0.88rem; color: #d8d8f0; line-height: 1.65; margin-bottom: 0.5rem; word-break: break-word; }
    .post-item-content a { color: var(--cyan); text-decoration: none; }
    .post-item-content a:hover { text-decoration: underline; }
    .post-item-images { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 0.5rem; }
    .post-item-images img { max-width: 110px; max-height: 75px; object-fit: cover; border-radius: 3px; border: 1px solid rgba(0,240,255,0.15); cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
    .post-item-images img:hover { border-color: var(--cyan); transform: scale(1.04); }
    .post-item-meta { font-family: 'Share Tech Mono', monospace; font-size: 0.57rem; letter-spacing: 0.1em; color: rgba(136,136,170,0.5); text-transform: uppercase; }
    .post-actions { position: absolute; top: 0.55rem; right: 0.55rem; display: flex; flex-direction: column; gap: 5px; }
    .post-edit { background: none; border: 1px solid rgba(0,240,255,0.2); color: rgba(0,240,255,0.5); cursor: pointer; font-size: 0.68rem; padding: 4px 9px; border-radius: 2px; transition: all 0.18s; font-family: 'Share Tech Mono', monospace; line-height: 1; }
    .post-edit:hover { background: rgba(0,240,255,0.1); color: var(--cyan); border-color: rgba(0,240,255,0.55); }
    .post-delete { background: none; border: 1px solid rgba(255,45,120,0.2); color: rgba(255,45,120,0.5); cursor: pointer; font-size: 0.68rem; padding: 4px 9px; border-radius: 2px; transition: all 0.18s; font-family: 'Share Tech Mono', monospace; line-height: 1; }
    .post-delete:hover { background: rgba(255,45,120,0.12); color: var(--pink); border-color: rgba(255,45,120,0.55); }
    .post-delete:disabled, .post-edit:disabled { opacity: 0.4; cursor: not-allowed; }
    .edit-inline { margin-top: 0.65rem; }
    .edit-inline textarea { width: 100%; background: var(--dark); border: 1px solid rgba(0,240,255,0.25); color: var(--text); font-family: 'Exo 2', sans-serif; font-size: 0.88rem; padding: 0.6rem 0.8rem; border-radius: 2px; outline: none; resize: vertical; min-height: 90px; line-height: 1.6; transition: border-color 0.2s; box-sizing: border-box; }
    .edit-inline textarea:focus { border-color: rgba(0,240,255,0.5); }
    .edit-actions { display: flex; gap: 7px; margin-top: 7px; }
    .edit-save { background: var(--cyan); color: #050510; font-family: 'Orbitron', sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; padding: 7px 16px; border: none; border-radius: 2px; cursor: pointer; transition: all 0.18s; }
    .edit-save:hover { background: #33f4ff; }
    .edit-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .edit-cancel { background: transparent; color: rgba(136,136,170,0.7); font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; padding: 7px 14px; border: 1px solid rgba(136,136,170,0.2); border-radius: 2px; cursor: pointer; transition: all 0.18s; }
    .edit-cancel:hover { color: var(--muted); border-color: rgba(136,136,170,0.4); }
    /* confirm modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 10000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box { background: var(--dark2); border: 1px solid rgba(0,240,255,0.2); padding: 2rem 2rem 1.5rem; max-width: 360px; width: 90%; clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px)); transform: translateY(12px); transition: transform 0.2s; }
    .modal-overlay.open .modal-box { transform: translateY(0); }
    .modal-icon { font-size: 1.8rem; margin-bottom: 0.75rem; }
    .modal-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 0.4rem; letter-spacing: 0.06em; }
    .modal-desc { font-family: 'Exo 2', sans-serif; font-size: 0.84rem; color: var(--muted); line-height: 1.55; margin-bottom: 1.4rem; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-confirm { flex: 1; background: var(--pink); color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; padding: 10px; border: none; border-radius: 2px; cursor: pointer; transition: background 0.18s; }
    .modal-confirm:hover { background: #ff5599; }
    .modal-cancel-btn { flex: 1; background: transparent; color: var(--cyan); font-family: 'Orbitron', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; padding: 10px; border: 1px solid rgba(0,240,255,0.3); border-radius: 2px; cursor: pointer; transition: background 0.18s; }
    .modal-cancel-btn:hover { background: rgba(0,240,255,0.06); }
    /* lightbox */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 20000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox img { max-width: 92vw; max-height: 88vh; object-fit: contain; border: 1px solid rgba(0,240,255,0.2); border-radius: 3px; transform: scale(0.93); transition: transform 0.22s; box-shadow: 0 0 60px rgba(0,240,255,0.08); }
    .lightbox.open img { transform: scale(1); }
    .lightbox-close { position: absolute; top: 1.2rem; right: 1.4rem; background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); font-size: 1.2rem; width: 38px; height: 38px; border-radius: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.18s; }
    .lightbox-close:hover { color: #fff; border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); }
    .lightbox-hint { position: absolute; bottom: 1.2rem; left: 50%; transform: translateX(-50%); font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.25); text-transform: uppercase; white-space: nowrap; }
    .skel-line { height: 9px; border-radius: 2px; background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: skelShimmer 1.5s infinite; margin-bottom: 7px; }
    @keyframes skelShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .posts-empty { font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; letter-spacing: 0.12em; color: rgba(136,136,170,0.45); text-transform: uppercase; text-align: center; padding: 1.5rem 0; }
    @media (max-width: 560px) { .box { padding: 1.75rem 1.1rem; } .box-title { font-size: 1.25rem; } }

    /* ── PAGE TRANSITIONS ── */
    .box { transition: opacity 0.35s ease, transform 0.35s ease; }
    .box.transitioning-out { opacity: 0; transform: translateY(14px) scale(0.98); pointer-events: none; }
    .box.transitioning-in  { opacity: 0; transform: translateY(-14px) scale(0.98); }
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb orb-pink"></div>
<div class="orb orb-cyan"></div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-icon" id="confirmIcon">⚠️</div>
    <div class="modal-title" id="confirmTitle">Are you sure?</div>
    <div class="modal-desc" id="confirmDesc">This action cannot be undone.</div>
    <div class="modal-btns">
      <button class="modal-confirm" id="confirmOkBtn">Confirm</button>
      <button class="modal-cancel-btn" id="confirmCancelBtn">Cancel</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img src="" alt="Preview" id="lightboxImg">
  <div class="lightbox-hint">Click anywhere or press ESC to close</div>
</div>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <div class="box-logo">
    <img src="sync-logo.png" alt="SYNC" onerror="this.style.display='none'">
    <div class="box-logo-text">SYNC<span>·</span>ADMIN</div>
  </div>
  <div class="box-label">Restricted Access</div>
  <h1 class="box-title">Admin <span>Login</span></h1>
  <div class="box-divider"></div>
  <div class="msg" id="loginMsg"></div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="Enter admin password" autocomplete="current-password">
  </div>
  <button class="btn-primary" onclick="doLogin()">&#9654;&nbsp; Enter</button>
  <a href="index.html" style="display:block;text-align:center;margin-top:0.85rem;font-family:'Share Tech Mono',monospace;font-size:0.68rem;letter-spacing:0.15em;color:rgba(0,240,255,0.5);text-decoration:none;text-transform:uppercase;transition:color 0.2s;" onmouseover="this.style.color='#00f0ff'" onmouseout="this.style.color='rgba(0,240,255,0.5)'">&#8962;&nbsp; Back to Main Page</a>
</div>

<!-- ADMIN PANEL -->
<div class="box" id="adminBox" style="display:none; max-width:600px;">
  <div class="box-logo">
    <img src="sync-logo.png" alt="SYNC" onerror="this.style.display='none'">
    <div class="box-logo-text">SYNC<span>·</span>ADMIN</div>
  </div>
  <div class="box-label">Announcement Panel</div>
  <h1 class="box-title">Post <span>Announcement</span></h1>
  <div class="box-divider"></div>
  <div class="msg" id="postMsg"></div>
  <div class="field">
    <label>Author Name</label>
    <input type="text" id="authorInput" placeholder="e.g. [SYNC]-Lujuria-" value="SYNCHRONIZED">
  </div>
  <div class="field">
    <label>Announcement</label>
    <div class="toolbar">
      <button type="button" class="tool-btn" id="emojiToggleBtn" onclick="toggleEmoji()">&#128522; Emoji</button>
      <label class="tool-btn" style="margin:0;cursor:pointer;">
        &#128444; Image
        <input type="file" id="imgFileInput" accept="image/*" multiple style="display:none;" onchange="handleImages(this)">
      </label>
    </div>
    <div id="emojiGrid"><div class="eg-inner" id="emojiInner"></div></div>
    <div id="imgPreviews"></div>
    <textarea id="contentInput" placeholder="Type your announcement here... supports long text, emojis and URLs"></textarea>
    <div class="char-count" id="charCount">0 chars</div>
  </div>
  <button class="btn-primary" id="postBtn" onclick="postAnnouncement()">&#9654;&nbsp; Post Announcement</button>
  <button class="btn-secondary" onclick="confirmLogout()">&larr; Logout</button>
  <button class="btn-secondary" onclick="window.location.href='index.html'" style="margin-top:0.4rem;">&#8962;&nbsp; Back to Main Page</button>
  <div class="posts-section">
    <div class="posts-label">&#128225;&nbsp; Current Announcements</div>
    <div id="postsList">
      <div class="skel-line" style="width:55%;"></div>
      <div class="skel-line" style="width:100%;"></div>
      <div class="skel-line" style="width:70%;"></div>
    </div>
  </div>
</div>

<script>
  const WORKER_URL = 'https://sync-worker.lastresort962.workers.dev';
  const SECRET     = 'sync123';
  const PASSWORD   = 'sync@admin2026';

  let pendingImages = [];

  // ── CONFIRM MODAL ──
  var _confirmResolve = null;
  function showConfirm(title, desc, icon) {
    document.getElementById('confirmIcon').textContent  = icon || '⚠️';
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmDesc').textContent  = desc;
    document.getElementById('confirmModal').classList.add('open');
    return new Promise(function(resolve) { _confirmResolve = resolve; });
  }
  document.getElementById('confirmOkBtn').addEventListener('click', function() {
    document.getElementById('confirmModal').classList.remove('open');
    if (_confirmResolve) { _confirmResolve(true); _confirmResolve = null; }
  });
  document.getElementById('confirmCancelBtn').addEventListener('click', function() {
    document.getElementById('confirmModal').classList.remove('open');
    if (_confirmResolve) { _confirmResolve(false); _confirmResolve = null; }
  });

  // ── LIGHTBOX ──
  var lightbox    = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightboxImg');
  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(function() { lightboxImg.src = ''; }, 250);
  }
  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLightbox(); });

  // shared ESC key handler
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Escape') return;
    if (lightbox.classList.contains('open')) { closeLightbox(); return; }
    if (document.getElementById('confirmModal').classList.contains('open')) {
      document.getElementById('confirmModal').classList.remove('open');
      if (_confirmResolve) { _confirmResolve(false); _confirmResolve = null; }
    }
  });

  // ── AUTO-LOGIN (session only — gone when tab closes) ──
  window.addEventListener('load', function() {
    if (sessionStorage.getItem('sync_admin_auth') === '1') {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminBox').style.display = 'block';
      loadPosts();
    }
  });

  function showAdmin() {
    sessionStorage.setItem('sync_admin_auth', '1');
    var loginBox = document.getElementById('loginBox');
    var adminBox = document.getElementById('adminBox');
    loginBox.classList.add('transitioning-out');
    setTimeout(function() {
      loginBox.style.display = 'none';
      loginBox.classList.remove('transitioning-out');
      adminBox.style.display = 'block';
      adminBox.classList.add('transitioning-in');
      void adminBox.offsetWidth;
      adminBox.classList.remove('transitioning-in');
      loadPosts();
    }, 360);
  }

  // ── LOGIN ──
  function doLogin() {
    var val = document.getElementById('passwordInput').value;
    var msg = document.getElementById('loginMsg');
    if (val === PASSWORD) {
      msg.className = 'msg';
      showAdmin();
    } else {
      msg.textContent = 'Incorrect password — try again';
      msg.className = 'msg error';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }

  // ── LOGOUT (with confirm modal) ──
  async function confirmLogout() {
    var ok = await showConfirm('Log out?', 'You will need to enter your password again to return.', '🔒');
    if (!ok) return;
    sessionStorage.removeItem('sync_admin_auth');
    var loginBox = document.getElementById('loginBox');
    var adminBox = document.getElementById('adminBox');
    adminBox.classList.add('transitioning-out');
    setTimeout(function() {
      adminBox.style.display = 'none';
      adminBox.classList.remove('transitioning-out');
      document.getElementById('passwordInput').value = '';
      var loginMsg = document.getElementById('loginMsg');
      loginMsg.className = 'msg'; loginMsg.textContent = '';
      loginBox.style.display = 'block';
      loginBox.classList.add('transitioning-in');
      void loginBox.offsetWidth;
      loginBox.classList.remove('transitioning-in');
    }, 360);
  }

  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  // ── CHAR COUNT ──
  document.getElementById('contentInput').addEventListener('input', function() {
    document.getElementById('charCount').textContent = Array.from(this.value).length + ' chars';
  });
  document.getElementById('contentInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) postAnnouncement();
  });

  // ── EMOJI PICKER ──
  var EMOJIS = ['😀','😂','🥰','😍','😎','🤩','🥳','😤','😡','💀','👀','🔥','💯','✨','🎉','🎮','🏆','👑','⚡','💥','🌟','🎯','🛡️','⚔️','🤝','💪','👊','🙌','❤️','💙','💜','🩷','💚','🖤','🤍','❌','✅','📢','📡','🔔','🗓️','📸','🎵','🕹️','👾','🤖','🧠','😴','😭','🫡','💬','👋','🫂','🎊','🥇','⭐','🌈','🐉','🍀'];
  (function() {
    var inner = document.getElementById('emojiInner');
    EMOJIS.forEach(function(em) {
      var btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'emoji-btn'; btn.textContent = em;
      btn.onclick = function() {
        var ta = document.getElementById('contentInput');
        var pos = ta.selectionStart != null ? ta.selectionStart : ta.value.length;
        ta.value = ta.value.slice(0, pos) + em + ta.value.slice(pos);
        // Use Array.from to get correct length for multi-codepoint emoji
        ta.selectionStart = ta.selectionEnd = pos + Array.from(em).reduce(function(n, ch) { return n + ch.length; }, 0);
        ta.focus();
        document.getElementById('charCount').textContent = Array.from(ta.value).length + ' chars';
      };
      inner.appendChild(btn);
    });
  })();

  function toggleEmoji() {
    var grid = document.getElementById('emojiGrid');
    var btn  = document.getElementById('emojiToggleBtn');
    var isOpen = grid.style.display === 'block';
    grid.style.display = isOpen ? 'none' : 'block';
    btn.classList.toggle('active', !isOpen);
  }

  // ── IMAGE HANDLER ──
  function handleImages(input) {
    var files = Array.from(input.files);
    var container = document.getElementById('imgPreviews');
    var MAX_SIZE = 2 * 1024 * 1024; // 2MB per image
    files.forEach(function(file) {
      if (file.size > MAX_SIZE) {
        alert('Image "' + file.name + '" is too large (' + (file.size / 1024 / 1024).toFixed(1) + 'MB). Please use images under 2MB.');
        return;
      }
      var reader = new FileReader();
      reader.onload = function(e) {
        var b64 = e.target.result;
        var idx = pendingImages.push(b64) - 1;
        var wrap = document.createElement('div'); wrap.className = 'img-thumb';
        var img  = document.createElement('img'); img.src = b64;
        var del  = document.createElement('button');
        del.type = 'button'; del.className = 'img-thumb-del'; del.textContent = '✕'; del.title = 'Remove';
        del.onclick = function() { pendingImages[idx] = null; container.removeChild(wrap); };
        wrap.appendChild(img); wrap.appendChild(del); container.appendChild(wrap);
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  }

  // ── POST ANNOUNCEMENT ──
  async function postAnnouncement() {
    var content = document.getElementById('contentInput').value.trim();
    var author  = document.getElementById('authorInput').value.trim() || 'SYNCHRONIZED';
    var msg     = document.getElementById('postMsg');
    var btn     = document.getElementById('postBtn');
    var images  = pendingImages.filter(Boolean);

    if (!content && images.length === 0) {
      msg.textContent = 'Please write something or attach an image first';
      msg.className = 'msg error'; return;
    }

    btn.disabled = true; btn.innerHTML = '&#9654;&nbsp; Posting...'; msg.className = 'msg'; msg.textContent = '';

    try {
      var res = await fetch(WORKER_URL + '/post?secret=' + SECRET, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: content, author: author, images: images })
      });
      if (res.ok) {
        msg.textContent = 'Announcement posted!'; msg.className = 'msg success';
        document.getElementById('contentInput').value = '';
        document.getElementById('charCount').textContent = '0 chars';
        document.getElementById('imgPreviews').innerHTML = '';
        document.getElementById('emojiGrid').style.display = 'none';
        document.getElementById('emojiToggleBtn').classList.remove('active');
        pendingImages = [];
        // Small delay before reloading so the success message is readable
        setTimeout(loadPosts, 800);
      } else {
        var errTxt = await res.text().catch(function() { return ''; });
        msg.textContent = 'Server error ' + res.status + (errTxt ? ': ' + errTxt.slice(0,80) : '');
        msg.className = 'msg error';
      }
    } catch(e) {
      msg.textContent = 'Network error — check connection and try again';
      msg.className = 'msg error';
    }
    btn.disabled = false; btn.innerHTML = '&#9654;&nbsp; Post Announcement';
  }

  // ── LOAD POSTS ──
  async function loadPosts() {
    var list = document.getElementById('postsList');
    list.innerHTML = '<div class="skel-line" style="width:55%;"></div><div class="skel-line" style="width:100%;"></div><div class="skel-line" style="width:72%;"></div>';

    try {
      var res = await fetch(WORKER_URL + '/announcements', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var posts = await res.json();

      if (!Array.isArray(posts) || posts.length === 0) {
        list.innerHTML = '<div class="posts-empty">No announcements yet</div>'; return;
      }

      list.innerHTML = '';
      posts.forEach(function(p, i) {
        var item = document.createElement('div');
        item.className = 'post-item';
        item.dataset.index = i;

        var rawMedia = [].concat(p.images || [], p.attachments || []).filter(Boolean);
        var imgsHtml = '';
        if (rawMedia.length) {
          var thumbs = rawMedia.map(function(a) {
            var url = typeof a === 'string' ? a : a.url;
            if (!url) return '';
            var safe = escHtml(url);
            return '<img src="' + safe + '" loading="lazy" referrerpolicy="no-referrer" alt="img" style="min-height:50px;background:rgba(0,240,255,0.05);" onclick="openLightbox(this.src)">';
          }).join('');
          imgsHtml = '<div class="post-item-images">' + thumbs + '</div>';
        }

        var editedBadge = p.edited ? ' &middot; <span style="color:rgba(0,240,255,0.4);font-size:0.55rem;">edited</span>' : '';

        item.innerHTML =
          '<div class="post-actions">' +
            '<button class="post-edit" onclick="startEdit(this,' + i + ')">✎ Edit</button>' +
            '<button class="post-delete" onclick="deletePost(this,' + i + ')">✕ Del</button>' +
          '</div>' +
          '<div class="post-item-body">' +
            '<div class="post-item-content" data-raw="' + escHtml(p.content || '') + '">' + cleanAndLink(p.content || '') + '</div>' +
            imgsHtml +
            '<div class="post-item-meta">' + escHtml(p.author || 'SYNCHRONIZED') + ' &middot; ' + timeAgo(p.timestamp) + editedBadge + '</div>' +
          '</div>';

        list.appendChild(item);
      });

    } catch(e) {
      list.innerHTML =
        '<div style="color:rgba(255,45,120,0.8);font-size:0.8rem;font-family:Share Tech Mono,monospace;line-height:2;">' +
          '&#10005; Could not load posts<br>' +
          '<span style="font-size:0.65rem;opacity:0.6;">' + escHtml(e.message) + '</span><br>' +
          '<button onclick="loadPosts()" style="margin-top:8px;background:rgba(0,240,255,0.08);border:1px solid rgba(0,240,255,0.3);color:#00f0ff;font-family:Orbitron,sans-serif;font-size:0.7rem;letter-spacing:0.1em;padding:7px 16px;cursor:pointer;border-radius:2px;">&#8635; Retry</button>' +
        '</div>';
    }
  }

  // ── EDIT (inline) ──
  function startEdit(btn, index) {
    var item = btn.closest('.post-item');

    // Close any other open edits
    document.querySelectorAll('.post-item.editing').forEach(function(el) {
      if (el !== item) cancelEdit(el);
    });

    item.classList.add('editing');
    var contentDiv = item.querySelector('.post-item-content');

    // Decode the raw HTML-escaped text back to plain text
    var tmp = document.createElement('textarea');
    tmp.innerHTML = contentDiv.dataset.raw || '';
    var rawText = tmp.value;

    contentDiv.style.display = 'none';
    btn.textContent = '✎ …';
    btn.disabled = true;

    // Build edit UI with DOM (avoids innerHTML injection issues)
    var editEl  = document.createElement('div');
    editEl.className = 'edit-inline';

    var ta = document.createElement('textarea');
    ta.value = rawText;

    var actions = document.createElement('div');
    actions.className = 'edit-actions';

    var saveBtn = document.createElement('button');
    saveBtn.className = 'edit-save';
    saveBtn.textContent = '✓ Save';
    saveBtn.onclick = function() { saveEdit(saveBtn, index); };

    var cancelBtn = document.createElement('button');
    cancelBtn.className = 'edit-cancel';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.onclick = function() { cancelEdit(item); };

    actions.appendChild(saveBtn);
    actions.appendChild(cancelBtn);
    editEl.appendChild(ta);
    editEl.appendChild(actions);
    contentDiv.parentNode.insertBefore(editEl, contentDiv.nextSibling);
    ta.focus();
  }

  function cancelEdit(item) {
    var editEl = item.querySelector('.edit-inline');
    if (editEl) editEl.remove();
    var contentDiv = item.querySelector('.post-item-content');
    if (contentDiv) contentDiv.style.display = '';
    item.classList.remove('editing');
    var editBtn = item.querySelector('.post-edit');
    if (editBtn) { editBtn.textContent = '✎ Edit'; editBtn.disabled = false; }
  }

  async function saveEdit(btn, index) {
    var item     = btn.closest('.post-item');
    var textarea = item.querySelector('.edit-inline textarea');
    var newText  = textarea.value.trim();

    if (!newText) {
      textarea.style.borderColor = 'rgba(255,45,120,0.6)';
      setTimeout(function() { textarea.style.borderColor = ''; }, 1200);
      return;
    }

    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      var res = await fetch(WORKER_URL + '/announcements', { cache: 'no-store' });
      if (!res.ok) throw new Error('Fetch failed: HTTP ' + res.status);
      var posts = await res.json();
      if (!Array.isArray(posts)) throw new Error('Invalid data');
      if (index < 0 || index >= posts.length) throw new Error('Index out of range');

      posts[index].content = newText;
      posts[index].edited  = new Date().toISOString();

      var saveRes = await fetch(WORKER_URL + '/save?secret=' + SECRET, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(posts)
      });

      if (!saveRes.ok) throw new Error('Save failed: HTTP ' + saveRes.status);
      cancelEdit(item);
      loadPosts();

    } catch(e) {
      btn.disabled = false; btn.textContent = '✓ Save';
      alert('Edit failed: ' + e.message);
    }
  }

  // ── DELETE ──
  async function deletePost(btn, index) {
    var ok = await showConfirm('Delete announcement?', 'This will permanently remove the post and cannot be undone.', '🗑️');
    if (!ok) return;

    var item = btn.closest('.post-item');
    btn.disabled = true; btn.textContent = 'Del…';

    try {
      var res = await fetch(WORKER_URL + '/announcements', { cache: 'no-store' });
      if (!res.ok) throw new Error('Fetch failed: HTTP ' + res.status);
      var posts = await res.json();
      if (!Array.isArray(posts)) throw new Error('Invalid data');
      if (index < 0 || index >= posts.length) throw new Error('Index out of range');

      posts.splice(index, 1);

      var saveRes = await fetch(WORKER_URL + '/save?secret=' + SECRET, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(posts)
      });

      if (!saveRes.ok) throw new Error('Save failed: HTTP ' + saveRes.status);
      item.classList.add('deleting');
      setTimeout(loadPosts, 320);

    } catch(e) {
      btn.disabled = false; btn.textContent = '✕ Del';
      alert('Delete failed: ' + e.message);
    }
  }

  // ── HELPERS ──
  function timeAgo(iso) {
    if (!iso) return '—';
    var ts = new Date(iso).getTime();
    if (isNaN(ts)) return '—';
    var diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 0)    return 'just now';
    if (diff < 60)   return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function cleanAndLink(text) {
    if (!text) return '';
    let raw = text;
    raw = raw.replace(/\\n/g, '\n');
    raw = raw.replace(/<a?:[a-zA-Z0-9_]+:[0-9]+>/g, '');
    raw = raw.replace(/\n{3,}/g, '\n\n');
    const spans = [];
    function ph(html) { const id = '\x00PH' + spans.length + '\x00'; spans.push(html); return id; }
    function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    raw = raw.replace(/\*\*\*(.+?)\*\*\*/gs, (_, t) => ph('<strong><em>' + esc(t) + '</em></strong>'));
    raw = raw.replace(/\*\*(.+?)\*\*/gs,     (_, t) => ph('<strong>' + esc(t) + '</strong>'));
    raw = raw.replace(/__(.+?)__/gs,          (_, t) => ph('<u>' + esc(t) + '</u>'));
    raw = raw.replace(/\*(.+?)\*/gs,          (_, t) => ph('<em>' + esc(t) + '</em>'));
    raw = raw.replace(/@everyone\b/g, () => ph('<strong style="color:#00f0ff;">@everyone</strong>'));
    raw = raw.replace(/@here\b/g,     () => ph('<strong style="color:#00f0ff;">@here</strong>'));
    raw = raw.replace(/@([A-Za-z0-9_]+)/g, (_, n) => ph('<strong style="color:#00f0ff;">@' + esc(n) + '</strong>'));
    raw = raw.replace(/#([A-Za-z0-9_-]+)/g, (_, c) => ph('<strong style="color:#ffd700;">#' + esc(c) + '</strong>'));
    // Split on placeholders; escape only plain text segments, then linkify
    const parts = raw.split(/(\x00PH\d+\x00)/);
    let out = parts.map(function(seg) {
      if (/^\x00PH\d+\x00$/.test(seg)) return seg;
      let s = seg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      s = s.replace(/(https?:\/\/[^\s<"]+)/g, function(url) {
        return '<a href="' + url + '" target="_blank" rel="noopener">' + url + '</a>';
      });
      return s;
    }).join('');
    out = out.replace(/\x00PH(\d+)\x00/g, (_, i) => spans[+i]);
    out = out.replace(/\n/g, '<br>');
    return out;
  }
</script>
