<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — SYNCHRONIZED</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="sync-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #ff2d78;
      --cyan: #00f0ff;
      --gold: #ffd700;
      --dark: #050510;
      --dark2: #0a0a1e;
      --text: #e8e8f8;
      --muted: #dae7e6;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      overflow: hidden;
    }

    /* ── SCAN LINES ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── GRID ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,240,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── ORBS ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.2;
      pointer-events: none;
    }
    .orb-pink { width: 500px; height: 500px; background: var(--pink); top: -150px; right: -150px; }
    .orb-cyan { width: 400px; height: 400px; background: var(--cyan); bottom: -120px; left: -120px; }

    /* ── MAIN CONTAINER ── */
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    /* ── CORNER BRACKETS ── */
    .corner { position: fixed; width: 50px; height: 50px; }
    .corner-tl { top: 24px; left: 24px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
    .corner-tr { top: 24px; right: 24px; border-top: 2px solid var(--pink); border-right: 2px solid var(--pink); }
    .corner-bl { bottom: 24px; left: 24px; border-bottom: 2px solid var(--pink); border-left: 2px solid var(--pink); }
    .corner-br { bottom: 24px; right: 24px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

    /* ── STATUS LABEL ── */
    .status-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.45em;
      color: var(--pink);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s forwards;
    }

    /* ── 404 GLITCH NUMBER ── */
    .glitch-wrap {
      position: relative;
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.35s forwards;
    }

    .glitch-num {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(7rem, 22vw, 14rem);
      font-weight: 900;
      line-height: 1;
      color: #fff;
      letter-spacing: 0.05em;
      text-shadow:
        0 0 40px rgba(255,45,120,0.5),
        0 0 80px rgba(255,45,120,0.2);
      position: relative;
      display: inline-block;
    }

    /* Glitch layers */
    .glitch-num::before,
    .glitch-num::after {
      content: '404';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      font-family: 'Orbitron', sans-serif;
      font-size: inherit;
      font-weight: 900;
    }
    .glitch-num::before {
      color: var(--cyan);
      animation: glitchA 3.5s infinite;
      clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%);
    }
    .glitch-num::after {
      color: var(--pink);
      animation: glitchB 3.5s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    }

    @keyframes glitchA {
      0%,90%,100% { transform: translate(0); opacity: 0; }
      91%          { transform: translate(-4px, 1px); opacity: 0.85; }
      93%          { transform: translate(3px, -1px); opacity: 0.6; }
      95%          { transform: translate(-2px, 2px); opacity: 0.85; }
      97%          { transform: translate(0); opacity: 0; }
    }
    @keyframes glitchB {
      0%,88%,100% { transform: translate(0); opacity: 0; }
      89%          { transform: translate(4px, -2px); opacity: 0.8; }
      91%          { transform: translate(-3px, 1px); opacity: 0.5; }
      93%          { transform: translate(2px, -1px); opacity: 0.8; }
      95%          { transform: translate(0); opacity: 0; }
    }

    /* ── SUBTITLE ── */
    .subtitle {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.5s forwards;
    }

    /* ── DESCRIPTION ── */
    .desc {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: rgba(218,231,230,0.55);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      line-height: 1.7;
      max-width: 380px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.65s forwards;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.6s forwards;
    }

    /* ── BUTTONS ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.8s forwards;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--pink);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 2px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    }
    .btn-home:hover {
      background: #ff5599;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,45,120,0.45);
    }

    .btn-back {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: rgba(0,240,255,0.5);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
      cursor: pointer;
      background: none;
      border: none;
    }
    .btn-back:hover { color: var(--cyan); }

    /* ── LOGO ── */
    .logo-wrap {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      opacity: 0;
      animation: fadeDown 0.5s ease 0.1s forwards;
    }
    .logo-wrap img {
      height: 38px;
      width: auto;
      filter: drop-shadow(0 0 10px rgba(0,240,255,0.3));
    }

    /* ── TERMINAL LINE ── */
    .terminal {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: rgba(0,240,255,0.2);
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      animation: fadeUp 0.5s ease 1s forwards;
    }
    .terminal .cursor {
      display: inline-block;
      width: 6px;
      height: 0.75em;
      background: rgba(0,240,255,0.35);
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── SHARED ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      .corner { width: 32px; height: 32px; }
      .desc { font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb-pink"></div>
<div class="orb orb-cyan"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Logo top center -->
<div class="logo-wrap">
  <img src="sync-logo.png" alt="SYNCHRONIZED" onerror="this.style.display='none'">
</div>

<!-- Main content -->
<div class="container">
  <div class="status-label">Error 404 &mdash; Signal Lost</div>

  <div class="glitch-wrap">
    <div class="glitch-num">404</div>
  </div>

  <div class="subtitle">Page Not Found</div>
  <div class="divider"></div>

  <div class="desc">
    The coordinates you entered don't exist<br>
    in this sector. You may have followed<br>
    a broken link or a dead signal.
  </div>

  <div class="btn-group">
    <a href="index.html" class="btn-home">&#8962;&nbsp; Return to Base</a>
    <button class="btn-back" onclick="history.length > 1 ? history.back() : window.location.href='index.html'">
      &larr; Go Back
    </button>
  </div>
</div>

<!-- Terminal footer -->
<div class="terminal">
  SYNCHRONIZED &mdash; synchronized.site &mdash; 404<span class="cursor"></span>
</div>

</body>
</html>
